<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮貌大挑戰 - 高階版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .main-container {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 320px;
        }
        .game-area {
            background: radial-gradient(circle, #ffffff 0%, #e0f2fe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        .scoreboard {
            background-color: #ffffff;
            border-left: 4px solid #bae6fd;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
        }
        .student-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .score-btn {
            background: #3b82f6;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .scenario-box {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 95%;
            height: 85%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border: 8px solid #3b82f6;
            position: relative;
        }
        .ans-box {
            transition: all 0.4s ease;
            opacity: 0;
            transform: scale(0.9);
        }
        .ans-box.show {
            opacity: 1;
            transform: scale(1);
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transition: height 1s ease-out;
        }
        .rank-1 { background-color: #fcd34d; height: 200px; width: 100px; }
        .rank-2 { background-color: #e2e8f0; height: 150px; width: 100px; }
        .rank-3 { background-color: #fb923c; height: 100px; width: 100px; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 左側遊戲區 -->
        <div class="game-area">
            <div id="start-screen" class="text-center">
                <h1 class="text-6xl font-extrabold text-blue-600 mb-6">✨ 禮貌大挑戰 ✨</h1>
                <p class="text-2xl text-gray-600 mb-8">準備好面對挑戰了嗎？</p>
                <button onclick="startGame()" class="bg-blue-500 text-white text-3xl font-bold py-6 px-16 rounded-full shadow-lg hover:bg-blue-600 active:scale-95 transition">
                    開始挑戰
                </button>
            </div>

            <div id="quiz-screen" class="hidden scenario-box">
                <div class="absolute top-6 left-6 right-6 flex justify-between items-center">
                    <span class="text-gray-400 font-bold text-lg">情境練習</span>
                    <span id="progress-text" class="text-blue-500 font-bold text-xl">第 1 / 40 題</span>
                </div>

                <div id="scenario-icon" class="text-9xl mb-4">🤫</div>
                <h2 id="scenario-text" class="text-3xl md:text-4xl font-bold text-gray-800 mb-8 leading-relaxed max-w-4xl text-center px-4">
                    情境載入中...
                </h2>

                <div id="control-buttons" class="w-full flex flex-col items-center">
                    <button id="show-ans-btn" onclick="revealAnswer()" class="bg-orange-500 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-md hover:bg-orange-600">
                        💡 公布答案
                    </button>
                    
                    <div id="answer-container" class="ans-box hidden flex flex-col items-center w-full">
                        <div id="answer-tag" class="text-5xl font-black mb-4"></div>
                        <p id="explanation-text" class="text-2xl text-gray-700 mb-6 max-w-3xl bg-blue-50 p-6 rounded-2xl border-l-8 border-blue-400 text-center">
                            解釋...
                        </p>
                        <button onclick="nextQuestion()" class="bg-green-500 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-md hover:bg-green-600">
                            下一題 ➡️
                        </button>
                    </div>
                </div>
            </div>

            <!-- Kahoot 風格頒獎台 -->
            <div id="result-screen" class="hidden text-center w-full">
                <h2 class="text-5xl font-bold text-blue-600 mb-10">🏆 本日禮貌大師 🏆</h2>
                <div class="flex items-end justify-center gap-4 mb-10 h-64">
                    <div class="podium-item">
                        <span id="rank-2-name" class="font-bold text-xl mb-2"></span>
                        <div class="rank-2 rounded-t-lg flex items-center justify-center text-4xl font-bold text-gray-500 shadow-lg">2</div>
                    </div>
                    <div class="podium-item">
                        <span id="rank-1-name" class="font-bold text-2xl mb-2 text-yellow-600"></span>
                        <div class="rank-1 rounded-t-lg flex items-center justify-center text-6xl font-bold text-white shadow-lg">1</div>
                    </div>
                    <div class="podium-item">
                        <span id="rank-3-name" class="font-bold text-xl mb-2"></span>
                        <div class="rank-3 rounded-t-lg flex items-center justify-center text-4xl font-bold text-white shadow-lg">3</div>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-blue-500 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg">
                    重新挑戰
                </button>
            </div>
        </div>

        <!-- 右側計分板 (不捲動) -->
        <div class="scoreboard">
            <h3 class="text-2xl font-bold text-blue-800 text-center mb-2">🌟 小英雄榜</h3>
            <div id="student-list" class="flex-grow flex flex-col justify-between py-2">
                <!-- 動態生成 -->
            </div>
            <div class="text-center pt-2">
                <button onclick="resetScores()" class="text-sm text-gray-400 hover:text-red-500">清除全部分數</button>
            </div>
        </div>
    </div>

    <script>
        const students = ["珩睿", "淇淇", "桐安", "維廣", "芊雨", "昀楨", "楚楚"];
        let scores = {};

        function initScoreboard() {
            const list = document.getElementById('student-list');
            students.forEach(name => {
                scores[name] = 0;
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <span class="text-lg font-bold text-gray-700">${name}</span>
                    <div class="flex items-center gap-3">
                        <span id="score-${name}" class="text-2xl font-black text-blue-600">0</span>
                        <div onclick="addPoint('${name}')" class="score-btn">+1</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function addPoint(name) {
            scores[name]++;
            document.getElementById(`score-${name}`).innerText = scores[name];
        }

        function resetScores() {
            students.forEach(name => {
                scores[name] = 0;
                document.getElementById(`score-${name}`).innerText = 0;
            });
        }

        // 全 40 題高難度情境 (涵蓋社交直覺、心理邊界與非言語情緒)
        const questions = [
            { text: "同學在分享他養的貓過世了，小明雖然覺得難過，但為了不讓氣氛太沉重，馬上大聲講了一個笑話。", isPolite: false, explanation: "在別人表達悲傷時強行切換氣氛是不體貼的，應該給予傾聽與同情。", icon: "🐱" },
            { text: "看見兩位朋友在爭論，小華沒有介入幫誰，而是等他們冷靜後，分別問兩人：「你現在感覺好點了嗎？」", isPolite: true, explanation: "不隨便站隊且關心朋友的情緒，是高階的社交禮貌。", icon: "🕊️" },
            { text: "在小團體聊天時，發現有一位同學一直插不進話，你主動看向他並問：「你對這件事有什麼想法嗎？」", isPolite: true, explanation: "主動邀請邊緣的人加入對話，是具備高度觀察力的體貼行為。", icon: "🗣️" },
            { text: "當你正在專心畫畫時，朋友一直站在你旁邊評論：「這裡畫錯了、那裡顏色不好看」，你氣得大喊：「閉嘴，走開！」", isPolite: false, explanation: "雖然對方冒犯在先，但大喊大叫仍不禮貌，應溫和表達：「請讓我安靜畫畫」。", icon: "🎨" },
            { text: "收到好朋友送的生日禮物，雖然你已經有一個一模一樣的了，你依然微笑說：「謝謝你，這顏色很漂亮！」", isPolite: true, explanation: "禮貌是為了回報對方的「心意」，而非評價「物品」本身。", icon: "🎁" },
            { text: "老師正在批評全班表現不好，小強覺得自己表現很好，所以在那裡玩筆、搖晃椅子，表現出不在乎的樣子。", isPolite: false, explanation: "這是一種非言語的不尊重，集體反省時應維持莊重的態度。", icon: "🪑" },
            { text: "你去別人家作客，想上廁所時，先詢問主人：「請問我可以借用廁所嗎？是在那一扇門後嗎？」", isPolite: true, explanation: "尊重別人的私人空間，不隨意探索，是基本修養。", icon: "🚽" },
            { text: "同學告訴你一個祕密後，你雖然沒有告訴別人，卻在聊天中故意暗示：「我知道某些人不知道的事喔。」", isPolite: false, explanation: "這種炫耀資訊的行為會讓當事人感到不安，是對信任的隱性背叛。", icon: "🤐" },
            { text: "當朋友在哭時，你沒有一直問「你為什麼哭」，而是默默遞上一張衛生紙並坐在他旁邊陪他。", isPolite: true, explanation: "給予適度的空間與沉默的陪伴，往往比言語詢問更有禮貌。", icon: "🤧" },
            { text: "看見老師雙手提著很重的東西，小明跑過去問：「老師，我幫妳開門好嗎？」而不是強行要幫忙提。", isPolite: true, explanation: "提供合適的幫助（如開門）而非造成對方的負擔或尷尬，是聰明的禮貌。", icon: "🚪" },
            { text: "在餐廳吃飯，服務生不小心把湯灑了一點在你的桌上，你對他說：「沒關係，擦掉就好了，辛苦了。」", isPolite: true, explanation: "對服務人員展現寬容與理解，是人格高度的體現。", icon: "🍲" },
            { text: "同學說他今天心情不好，你回答：「那有什麼好難過的，我上次考不好也沒怎樣啊！」", isPolite: false, explanation: "這叫「否定他人的感受」，每個人對事情的壓力感受不同，應給予尊重。", icon: "💔" },
            { text: "你在講話時，發現對方開始看手錶或眼神飄向門口，你主動說：「你是不是有事要忙？我們下次再聊。」", isPolite: true, explanation: "能察覺他人的非言語信號並主動結束對話，是極高的社交智慧。", icon: "⌚" },
            { text: "跟長輩講話時，雖然你很急著想表達，但你會等長輩把話說完一段落，才說：「我可以補充一下嗎？」", isPolite: true, explanation: "不打斷他人說話，是對說話者最基本的禮貌。", icon: "👴" },
            { text: "在安靜的教室裡，你雖然沒說話，但一直用手指甲抓桌子發出刺耳的聲響。", isPolite: false, explanation: "製造令人不適的噪音也是一種對環境與他人的不尊重。", icon: "💅" },
            { text: "發現同學的拉鍊沒拉，你沒有大聲提醒，而是走到他身邊小聲跟他說。", isPolite: true, explanation: "在保護對方自尊心的前提下給予提醒，是非常貼心的舉動。", icon: "🤐" },
            { text: "全班都在排隊，小明發現前面是好朋友，就直接走過去插在朋友前面聊天。", isPolite: false, explanation: "插隊是對所有排隊者的不公平與不尊重，不論認識與否。", icon: "🚶" },
            { text: "玩桌遊輸了，小華雖然心裡很不甘願，但還是對贏家說：「這場比賽很精彩，你玩得很好。」", isPolite: true, explanation: "具備風度的競爭者，才是真正的贏家。", icon: "🎲" },
            { text: "老師在講台上說錯一個字，小明馬上站起來大聲糾正：「老師妳寫錯了！那不是這樣念！」", isPolite: false, explanation: "糾正別人應注意場合與語氣，公開大聲糾正會讓對方尷尬。", icon: "✍️" },
            { text: "去參加派對，離開前主動找主人的爸媽說：「謝謝你們邀請我，今天我很開心。」", isPolite: true, stars: 4, explanation: "主動表達感謝與道別，會讓主人感受到你的重視。", icon: "🎉" },
            { text: "發現同學在背後說你壞話，你沒有衝過去罵他，而是私下找他問：「我有什麼地方讓你不舒服嗎？」", isPolite: true, explanation: "理性的溝通比情緒化的衝突更能優雅地解決問題。", icon: "💬" },
            { text: "同學正在努力練習跳繩卻一直失敗，小明在旁邊喊：「你怎麼這麼笨啊，連這個都不會。」", isPolite: false, explanation: "打擊別人的自信與努力，是非常惡意的行為。", icon: "🪢" },
            { text: "有人在跟你講嚴肅的事，你卻一直拿著手機在看通知或滑動螢幕。", isPolite: false, explanation: "這傳遞出「你的話沒有手機重要」的訊息，很不禮貌。", icon: "📱" },
            { text: "即使在家裡，進去哥哥的房間前也會先敲門，等哥哥說「進來」才進去。", isPolite: true, explanation: "尊重家人的隱私空間，是維持家庭和諧的禮貌。", icon: "🚪" },
            { text: "看到好朋友跟其他你不認識的人玩得很開心，你跑過去生氣地把朋友拉走。", isPolite: false, explanation: "朋友不是你的財產，應尊重朋友的社交權力與空間。", icon: "👫" },
            { text: "同學借你的書不小心撕破一頁，他道歉時你說：「雖然這本書我很喜歡，但我知道你不是故意的，沒關係。」", isPolite: true, explanation: "把友誼放在物質之上，並溫柔地原諒，是非常高級的修養。", icon: "📖" },
            { text: "在公共場合（如公車上）大聲播放手機影片，完全不管旁邊的人想休息。", isPolite: false, explanation: "私人娛樂不應干擾到公共空間的安寧。", icon: "🚌" },
            { text: "老師問問題沒人回答，你雖然不確定答案，但為了支持老師，主動舉手說出你的想法。", isPolite: true, explanation: "給予講者反饋與支持，是一種溫柔的社交禮貌。", icon: "✋" },
            { text: "看見同學沒帶午餐，小明雖然想分享，卻在全班面前大喊：「欸！你沒飯吃喔？我分你啦！」", isPolite: false, explanation: "這會讓受助者感到自卑與尷尬，幫助別人應顧及對方的面子。", icon: "🍱" },
            { text: "當你感覺到自己快要發脾氣時，你主動對身邊的人說：「我現在情緒不太好，想先安靜一下。」", isPolite: true, explanation: "懂得覺察情緒並負責地處理它，是不遷怒於人的高級禮貌。", icon: "🌋" },
            { text: "有人在稱讚你時，你一直說：「沒有啦，我很爛，你亂講」，讓氣氛變得很尷尬。", isPolite: false, explanation: "過度且尷尬的謙虛會讓讚美者不自在，應大方微笑說「謝謝你的稱讚」。", icon: "✨" },
            { text: "在別人家作客結束，主動幫忙把使用過的桌子擦乾淨，將椅子推回原位。", isPolite: true, explanation: "「不給人添麻煩」是社交中極具美德的禮貌。", icon: "🧹" },
            { text: "跟朋友約好時間卻遲到了，你一見面就解釋一堆理由，卻沒有先說「對不起，讓你久等了」。", isPolite: false, explanation: "解釋理由前，應先為耽誤別人的時間道歉。", icon: "⏰" },
            { text: "當你不同意別人的意見時，你先說：「我明白你的意思，但我的看法稍微有點不同...」", isPolite: true, explanation: "這叫「先肯定再否定」，能維持對話的禮貌氣氛。", icon: "💡" },
            { text: "同學在練習演講很緊張，你在台下故意跟旁邊的人交頭接耳，甚至發出笑聲。", isPolite: false, explanation: "這對台上的表演者是巨大的壓力與不尊重。", icon: "🎤" },
            { text: "在圖書館不小心撞到桌子發出巨響，你馬上小聲對周圍的人點頭致歉。", isPolite: true, explanation: "覺察到自己對環境造成的干擾並及時致歉，是負責任的行為。", icon: "🏛️" },
            { text: "朋友買了新衣服問你好不好看，你說：「這衣服顏色好土喔，你眼光真差。」", isPolite: false, explanation: "雖然是實話，但「眼光差」是人身攻擊，應學習溫婉的修辭。", icon: "👕" },
            { text: "看見同學在努力搬桌子，你沒有直接上手去搶，而是問：「需要我幫你抬另一邊嗎？」", isPolite: true, explanation: "尊重他人的主導權，詢問對方的需求後再行動。", icon: "🪑" },
            { text: "長輩在看電視，你因為想看卡通，直接拿走遙控器就轉台。", isPolite: false, explanation: "這種霸道的行為是極度的不尊重，應先徵得他人同意。", icon: "📺" },
            { text: "當別人在稱讚你的對手時，你也能點頭表示認同，而不是露出不屑的表情。", isPolite: true, explanation: "能承認他人的優秀，代表你有寬廣的心胸與良好的教養。", icon: "🌟" }
        ];

        let currentQuestion = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('scenario-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `第 ${currentQuestion + 1} / ${questions.length} 題`;
            document.getElementById('scenario-icon').innerText = q.icon;

            document.getElementById('answer-container').classList.add('hidden');
            document.getElementById('answer-container').classList.remove('show');
            document.getElementById('show-ans-btn').classList.remove('hidden');
        }

        function revealAnswer() {
            const q = questions[currentQuestion];
            const ansTag = document.getElementById('answer-tag');
            const expText = document.getElementById('explanation-text');
            const ansContainer = document.getElementById('answer-container');
            const showBtn = document.getElementById('show-ans-btn');

            ansTag.innerText = q.isPolite ? "✨ 這是禮貌的！ ✨" : "❌ 這是不禮貌喔！ ❌";
            ansTag.className = `text-5xl font-black mb-4 ${q.isPolite ? 'text-green-500' : 'text-red-500'}`;
            expText.innerText = q.explanation;
            
            showBtn.classList.add('hidden');
            ansContainer.classList.remove('hidden');
            setTimeout(() => ansContainer.classList.add('show'), 50);
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');

            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            document.getElementById('rank-1-name').innerText = sorted[0] ? sorted[0][0] : "無";
            document.getElementById('rank-2-name').innerText = sorted[1] ? sorted[1][0] : "無";
            document.getElementById('rank-3-name').innerText = sorted[2] ? sorted[2][0] : "無";
        }

        window.onload = initScoreboard;
    </script>
</body>
